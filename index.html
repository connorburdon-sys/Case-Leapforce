<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leapforce Call-to-Action Template</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section>

        <div class="ctaHead">

            <label class="label">label </label>
            <h1 class="heading1">

                Mandatory title about the <br>
                <span class="heading1Highlight">call-to-action</span>
                here 
            </h1>

            <p class="textLarge">Optional body copy goes here.</p>

            <button class="tertiaryCTA textLarge"> Optional button here

                <div class="arrow">
                    <div class="arrowLine"></div>
                    <div class="arrowHead"></div>
                </div>

            </button>

        </div>

        <div class="CTAcards">

            <div class="card">
                <div class="cardBody">
                    <h4 class="heading4">Title</h4>

                    <div class="cardFlex">
                        <p class="textLarge cardText">Supporting text about the call-to-action goes here.</p>

                        <button class="arrowBtn">
                            <div class="arrow cardArrow">   
                                <div class="arrowLine cardArrowLine"></div>
                                <div class="arrowHead cardArrowHead"></div>
                            </div>
                        </button>

                    </div>
                </div>
            </div>

            <div class="card">
                <div class="cardBody">
                    <h4 class="heading4">Title</h4>

                    <div class="cardFlex">
                        <p class="textLarge cardText">Supporting text about the call-to-action goes here.</p>

                        <button class="arrowBtn">
                            <div class="arrow cardArrow">   
                                <div class="arrowLine cardArrowLine"></div>
                                <div class="arrowHead cardArrowHead"></div>
                            </div>
                        </button>
                        
                    </div>
                </div>
            </div>
            
        </div>

    </section>
</body>
</html>
